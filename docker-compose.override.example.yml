# Copy to `docker-compose.override.yml` (same folder as docker-compose.yml).
# Docker Compose merges this file automatically — no Portainer per-service env UI needed.
#
#   copy docker-compose.override.example.yml docker-compose.override.yml
#   (edit MAC / key, then redeploy the stack)

services:
  mqtt-worker:
    environment:
      # Same MAC as "Device MAC(s)" in caregiver → My users for this hat
      DEVICE_SERIAL: "98:A3:16:7E:57:C0"
      # Uncomment and set if your web service uses a non-default key:
      # DEVICE_API_KEY: "paste-same-as-web-DEVICE_API_KEY"
