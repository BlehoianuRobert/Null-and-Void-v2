# Portainer: add variables in the stack "Environment variables" box (they fill ${VAR} here).
#   DEVICE_SERIAL=98:A3:16:7E:57:C0   ← required if ESP sends a plain number on senzor/distanta
#   DEVICE_API_KEY=...              ← same secret as web (optional if you keep change-me)
# Or on any host: copy docker-compose.override.example.yml → docker-compose.override.yml and edit.

services:
  mqtt-broker:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blindhat
    volumes:
      - db_data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/blindhat?schema=public
    command: >
      sh -c "npx prisma migrate deploy && npx prisma db seed"
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
      - migrate
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/blindhat?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: "change-me"
      DEVICE_API_KEY: ${DEVICE_API_KEY:-change-me}
      PHONE_APP_BASE_URL: "http://10.136.37.252:3000"
      PUSHER_APP_ID: ""
      PUSHER_KEY: ""
      PUSHER_SECRET: ""
      PUSHER_CLUSTER: ""
    ports:
      - "3000:3000"

  mqtt-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    depends_on:
      - mqtt-broker
      - web
    environment:
      MQTT_URL: mqtt://mqtt-broker:1883
      MQTT_TOPIC_DISTANCE: senzor/distanta
      MQTT_TOPIC_ACCEL: senzor/acceleratie
      MQTT_TOPIC_PHONE_LOCATION: phone/location
      MQTT_TOPIC_PHONE_MOTION: phone/motion
      # Optional fallback for plain numeric distance MQTT payloads. Prefer JSON on the wire:
      # {"distanceCm":40,"deviceMac":"98:A3:16:7E:57:C0"} — then each ESP can identify itself without changing this.
      DEVICE_SERIAL: ${DEVICE_SERIAL:-}
      APP_BASE_URL: http://web:3000
      DEVICE_API_KEY: ${DEVICE_API_KEY:-change-me}

volumes:
  db_data:
