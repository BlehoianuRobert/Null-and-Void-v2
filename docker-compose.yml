services:
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blindhat
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/blindhat?schema=public
    command: >
      sh -c "npx prisma migrate deploy && npx prisma db seed"
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
      - migrate
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/blindhat?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: "change-me"
      DEVICE_API_KEY: "change-me"
      PUSHER_APP_ID: ""
      PUSHER_KEY: ""
      PUSHER_SECRET: ""
      PUSHER_CLUSTER: ""
    ports:
      - "3000:3000"

  mqtt-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    depends_on:
      - mqtt-broker
      - web
    environment:
      MQTT_URL: mqtt://mqtt-broker:1883
      MQTT_TOPIC_DISTANCE: senzor/distanta
      MQTT_TOPIC_ACCEL: senzor/acceleratie
      MQTT_TOPIC_PHONE_LOCATION: phone/location
      # IMPORTANT: must match a registered Device.serialNumber in the app
      DEVICE_SERIAL: ESP32_Senzori
      APP_BASE_URL: http://web:3000
      DEVICE_API_KEY: "change-me"

volumes:
  db_data:
